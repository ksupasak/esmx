version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongo:
    image: mongo:5.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: bundle exec puma -C config/puma.rb
    expose:
      - "3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - mongo
      - redis
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    entrypoint: /entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "${SSL_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    environment:
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/etc/nginx/ssl/server.crt}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/etc/nginx/ssl/server.key}
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
    restart: unless-stopped

  resque:
    build: .
    command: bundle exec rake resque:work QUEUE=*
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - mongo
      - redis
    env_file:
      - .env

  resque_scheduler:
    build: .
    command: bundle exec rake resque:scheduler
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - mongo
      - redis
    env_file:
      - .env

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  bundle_cache:
