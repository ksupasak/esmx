version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: bundle exec puma -C config/puma.rb
    expose:
      - "3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - recordings_data:/recordings
    depends_on:
      - db
      - mongo
      - redis
      - minio
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    entrypoint: /entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "${SSL_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    environment:
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/etc/nginx/ssl/server.crt}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/etc/nginx/ssl/server.key}
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - mediamtx
      - minio
    restart: unless-stopped

  sidekiq:
    build: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - recordings_data:/recordings
    depends_on:
      - db
      - mongo
      - redis
      - minio
    env_file:
      - .env

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minadadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set download local/$${MINIO_BUCKET}/public;
      mc mb --ignore-existing local/$${MINIO_RECORDS_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minadadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-esmx-files}
      MINIO_RECORDS_BUCKET: ${MINIO_RECORDS_BUCKET:-media-records}

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    environment:
      - MTX_WEBRTCADDITIONALHOSTS=mediamtx
      - MEDIAMTX_WEBHOOK_SECRET=${MEDIAMTX_WEBHOOK_SECRET:-esmx-mediamtx-secret}
    ports:
      - "${MEDIAMTX_RTSP_PORT:-8554}:8554"
      - "${MEDIAMTX_RTMP_PORT:-1935}:1935"
      - "${MEDIAMTX_HLS_PORT:-8888}:8888"
      - "${MEDIAMTX_WEBRTC_PORT:-8889}:8889"
      - "${MEDIAMTX_API_PORT:-9997}:9997"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./mediamtx/playback.sh:/playback.sh:ro
      - ./mediamtx/on_record_complete.sh:/on_record_complete.sh:ro
      - recordings_data:/recordings

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  bundle_cache:
  minio_data:
  recordings_data:
